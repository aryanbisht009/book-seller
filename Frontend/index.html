<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Selling</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <!-- top bar -->
     <div class="ad_sec">  
        BUY BOOKS BY BEST AUTHORS IN AFFORDABLE PRICES 
     </div>

     <!-- navigation -->
      <div class="navbar">
        <div class="menu">
            <a href="">By Authors</a>
            <a href="">Best selling</a>
            <a href="">Mangas</a>
            <a href="">Finance</a>
            <a href="">Story</a>
        </div>
        <button class="Sign_in" type="button">Sign in</button>
      </div>
    
    <!-- slideshow -->
     <div id="slideshow">
    </div>
     
    <!-- books section -->
    <div id="books-section">
            <div class="book-card">

                <div class="book-image">
                    <img>
                </div>

                <div class="book-info">

                    <div class="book-title"></div>

                    <div class="rating">
                        <span>(1200)</span>
                    </div>

                    <div class="price-row">
                        <span class="discount-price"></span>
                        <span class="original-price"></span>
                        <span class="discount"></span>
                    </div>

                    <div class="author"></div>

                </div>
            </div>
    </div>

    <!-- About Section -->
        <div class="section">
            <h2>About and Help</h2>
            <p>Information about your platform.</p>
        </div>
</body>
</html>
